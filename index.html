<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cover Letter Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>AI Cover Letter Generator</h1>

    <input type="text" id="name" placeholder="Candidate Name">

    <input type="text" id="role" placeholder="Job Role">

    <input type="text" id="company" placeholder="Target Company">

    <textarea id="skills" placeholder="Enter Your Skills"></textarea>

    <button id="generateBtn">
        Generate Cover Letter
    </button>

    <h2>Generated Cover Letter</h2>

    <div id="output"></div>

    <button id="copyBtn">
        Copy to Clipboard
    </button>

</div>

<script src="app.js"></script>

</body>
</html>
